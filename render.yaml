services:
  - type: web
    name: chatbot-pfe2026-api
    runtime: python
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LOG_LEVEL
        value: INFO
      - key: DB_DRIVER
        value: ODBC Driver 18 for SQL Server
      - key: DB_ENCRYPT
        value: yes
      - key: DB_TRUST_SERVER_CERTIFICATE
        value: yes
      - key: DB_CONNECTION_TIMEOUT_SECONDS
        value: "30"
      - key: DB_SERVER
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
    aptPackages:
      - unixodbc-dev
      - msodbcsql18
