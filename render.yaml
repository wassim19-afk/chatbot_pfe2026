services:
  - type: web
    name: chatbot-pfe2026-api
    runtime: python
    plan: free
    branch: main
    rootDir: .
    buildCommand: bash build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LOG_LEVEL
        value: INFO
      # Using pymssql (no ODBC driver required)
      - key: DB_CONNECTION_TIMEOUT_SECONDS
        value: "30"
      - key: DB_SERVER
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
